<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentEval Dashboard</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #e0e0e0;
  --text2: #a0a0b0;
  --accent: #e94560;
  --green: #00c853;
  --yellow: #ffd600;
  --orange: #ff9100;
  --red: #ff1744;
  --blue: #448aff;
  --purple: #b388ff;
  --teal: #1de9b6;
  --radius: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Layout */
header { background: var(--surface); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 1.2rem; font-weight: 600; }
header .actions { display: flex; gap: 10px; align-items: center; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Buttons */
.btn { padding: 7px 16px; border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
.btn:hover { background: rgba(255,255,255,0.1); }
.btn-sm { padding: 4px 10px; font-size: 0.78rem; }

/* Filter bar */
.filter-bar { display: flex; gap: 8px; padding: 12px 0; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
.filter-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Score colors */
.score-high { color: var(--green); }
.score-good { color: #64dd17; }
.score-mid { color: var(--yellow); }
.score-low { color: var(--orange); }
.score-bad { color: var(--red); }

/* Bar */
.bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; }
.bar-inner { height: 100%; border-radius: 4px; transition: width 0.3s; }
.bar-inner.high { background: var(--green); }
.bar-inner.good { background: #64dd17; }
.bar-inner.mid { background: var(--yellow); }
.bar-inner.low { background: var(--orange); }
.bar-inner.bad { background: var(--red); }

.bar-lg { height: 14px; border-radius: 7px; }
.bar-lg .bar-inner { border-radius: 7px; }

/* Card */
.card { background: var(--surface); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }

/* Table */
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
th { color: var(--text2); font-weight: 500; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; }
tr:hover td { background: rgba(255,255,255,0.02); }
.session-link { cursor: pointer; color: var(--blue); font-family: monospace; font-size: 0.88rem; }
.session-link:hover { text-decoration: underline; }

/* Dims mini */
.dim-mini { display: flex; gap: 6px; flex-wrap: wrap; }
.dim-mini span { font-size: 0.72rem; padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.06); white-space: nowrap; }

/* Detail */
.back-link { color: var(--text2); cursor: pointer; font-size: 0.9rem; }
.back-link:hover { color: var(--text); }
.dim-card { margin-bottom: 10px; }
.dim-card .dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.dim-card .dim-name { font-weight: 600; }
.dim-card .dim-source { font-size: 0.75rem; padding: 2px 8px; border-radius: 3px; background: rgba(255,255,255,0.06); color: var(--text2); }
.dim-card .dim-reason { font-size: 0.85rem; color: var(--text2); margin-top: 6px; line-height: 1.5; }
.dim-card .dim-details { font-size: 0.78rem; color: var(--text2); margin-top: 4px; font-family: monospace; }
.dim-card .dim-weight { font-size: 0.75rem; color: var(--text2); margin-top: 4px; }
.overall-display { text-align: center; padding: 20px; }
.overall-display .big-score { font-size: 3rem; font-weight: 700; }
.overall-display .big-label { color: var(--text2); font-size: 0.9rem; margin-top: 4px; }
.meta { display: flex; gap: 20px; flex-wrap: wrap; font-size: 0.85rem; color: var(--text2); margin-bottom: 20px; }

/* Turn */
.turn { margin-bottom: 8px; }
.turn-header { padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: var(--radius) var(--radius) 0 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
.turn-header:hover { background: rgba(255,255,255,0.06); }
.turn-body { padding: 10px 14px; background: rgba(0,0,0,0.15); border-radius: 0 0 var(--radius) var(--radius); }
.step { padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; background: rgba(255,255,255,0.03); border-left: 3px solid transparent; }
.step.reasoning { border-left-color: var(--purple); }
.step.text { border-left-color: var(--blue); }
.step.tool_call { border-left-color: var(--orange); }
.step.tool_result { border-left-color: var(--teal); }
.step-badge { display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; margin-right: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-reasoning { background: rgba(179,136,255,0.2); color: var(--purple); }
.badge-text { background: rgba(68,138,255,0.2); color: var(--blue); }
.badge-tool { background: rgba(255,145,0,0.2); color: var(--orange); }
.badge-result { background: rgba(29,233,182,0.2); color: var(--teal); }
.step-content { font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: var(--text2); }
.user-input { font-size: 0.85rem; color: var(--text); padding: 6px 10px; background: rgba(255,255,255,0.04); border-radius: 4px; margin-bottom: 4px; }
.user-input::before { content: "> "; color: var(--accent); font-weight: bold; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state p { margin-top: 10px; font-size: 0.95rem; }
.toggle-label { font-size: 0.8rem; color: var(--text2); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; }
.toggle-label input { margin: 0; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text2); }

/* Diagnose */
.diag-badge { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 12px; cursor: pointer; transition: background 0.2s; text-decoration: none !important; }
.diag-btn { background: rgba(255,145,0,0.15); color: var(--orange); border: 1px solid rgba(255,145,0,0.3); }
.diag-btn:hover { background: rgba(255,145,0,0.3); }
.diag-issues { background: rgba(255,23,68,0.15); color: var(--red); border: 1px solid rgba(255,23,68,0.3); }
.diag-clean { background: rgba(0,200,83,0.15); color: var(--green); border: 1px solid rgba(0,200,83,0.3); }
.diag-pending { background: rgba(255,145,0,0.1); color: var(--orange); }
.diag-panel { margin-top: 20px; }
.diag-issue-card { padding: 12px 14px; margin-bottom: 8px; border-radius: var(--radius); background: rgba(255,255,255,0.03); border-left: 3px solid transparent; }
.diag-issue-card.sev-error { border-left-color: var(--red); }
.diag-issue-card.sev-warn { border-left-color: var(--orange); }
.diag-issue-card.sev-info { border-left-color: var(--blue); }
.diag-issue-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
.diag-issue-cat { display: inline-block; font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; margin-right: 6px; text-transform: uppercase; }
.cat-tool { background: rgba(255,145,0,0.2); color: var(--orange); }
.cat-prompt { background: rgba(179,136,255,0.2); color: var(--purple); }
.cat-token { background: rgba(68,138,255,0.2); color: var(--blue); }
.cat-view { background: rgba(255,214,0,0.2); color: var(--yellow); }
.diag-issue-detail { font-size: 0.85rem; color: var(--text2); line-height: 1.5; }
.diag-issue-loc { font-size: 0.78rem; color: var(--text2); margin-top: 4px; font-family: monospace; }
.diag-issue-evidence { font-size: 0.78rem; color: var(--text2); margin-top: 4px; padding: 6px 8px; background: rgba(0,0,0,0.2); border-radius: 4px; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto; }
.diag-raw { margin-top: 12px; }
.diag-raw-toggle { cursor: pointer; color: var(--blue); font-size: 0.82rem; }
.diag-raw-toggle:hover { text-decoration: underline; }
.diag-raw-content { margin-top: 6px; padding: 10px 12px; background: rgba(0,0,0,0.2); border-radius: 4px; font-family: monospace; font-size: 0.75rem; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; display: none; }

/* Responsive */
@media (max-width: 800px) {
  .container { padding: 12px; }
  table { font-size: 0.82rem; }
  th, td { padding: 8px 6px; }
  .hide-mobile { display: none; }
  .overall-display .big-score { font-size: 2.2rem; }
}
</style>
</head>
<body>

<header>
  <h1 id="page-title">AgentEval Dashboard</h1>
  <div class="actions" id="header-actions"></div>
</header>

<div class="container" id="content"></div>

<script>
const API = '/dashboard/api';

function scoreClass(v) {
  if (v >= 0.85) return 'high';
  if (v >= 0.7) return 'good';
  if (v >= 0.5) return 'mid';
  if (v >= 0.3) return 'low';
  return 'bad';
}

function scoreColor(v) {
  if (v >= 0.85) return 'var(--green)';
  if (v >= 0.7) return '#64dd17';
  if (v >= 0.5) return 'var(--yellow)';
  if (v >= 0.3) return 'var(--orange)';
  return 'var(--red)';
}

function barHtml(val, cls) {
  var sc = cls || scoreClass(val);
  return '<div class="bar"><div class="bar-inner ' + sc + '" style="width:' + (val * 100).toFixed(0) + '%"></div></div>';
}

function barHtmlLg(val) {
  var sc = scoreClass(val);
  return '<div class="bar bar-lg"><div class="bar-inner ' + sc + '" style="width:' + (val * 100).toFixed(0) + '%"></div></div>';
}

function formatMs(ms) { return ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : ms + 'ms'; }

// ── Router ──
function route() {
  var params = new URLSearchParams(window.location.search);
  var view = params.get('view') || 'dashboard';
  var sessionId = params.get('session');

  if (view === 'detail' && sessionId) {
    renderDetail(sessionId);
  } else {
    renderDashboard();
  }
}

function navTo(params) {
  var qs = new URLSearchParams(params).toString();
  window.history.pushState({}, '', '?' + qs);
  route();
}

// ── Dashboard ──
var PAGE_SIZE = 10;
window._activeFilter = window._activeFilter || 'low';
window._page = window._page || 1;

async function renderDashboard() {
  document.getElementById('page-title').textContent = 'AgentEval Dashboard';
  document.getElementById('header-actions').innerHTML =
    '<label class="toggle-label"><input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh(this.checked)"> auto</label>' +
    '<button class="btn" onclick="renderDashboard()">Refresh</button>';

  document.getElementById('content').innerHTML = '<div class="loading">Loading sessions...</div>';

  var autoEl = document.getElementById('auto-refresh');
  if (autoEl && window._autoInterval) autoEl.checked = true;

  try {
    var resp = await fetch(API + '/sessions');
    var data = await resp.json();
    window._sessions = data.sessions || [];
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><h2>Error</h2><p>Failed to load sessions: ' + e.message + '</p></div>';
    return;
  }

  if (window._sessions.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><h2>No sessions yet</h2><p>Start the proxy and send requests to see evaluation results here.</p></div>';
    return;
  }

  renderDashboardContent();
}

function switchFilter(filter) {
  window._activeFilter = filter;
  window._page = 1;
  renderDashboardContent();
}

function getFilteredSessions() {
  var sessions = window._sessions;
  var filter = window._activeFilter;

  if (filter === 'low') {
    return sessions.filter(function(s) {
      return !s.graded || s.overall < 0.6;
    });
  } else if (filter === 'mid') {
    return sessions.filter(function(s) {
      return s.graded && s.overall >= 0.6 && s.overall <= 0.8;
    });
  } else if (filter === 'high') {
    return sessions.filter(function(s) {
      return s.graded && s.overall > 0.8;
    });
  }
  return sessions;
}

function goPage(p) {
  window._page = p;
  renderDashboardContent();
  window.scrollTo(0, 0);
}

function renderDashboardContent() {
  var allSessions = getFilteredSessions();
  var graded = allSessions.filter(function(s) { return s.graded; });
  var pending = allSessions.filter(function(s) { return !s.graded; });
  var avgOverall = graded.length ? (graded.reduce(function(a,b) { return a + b.overall; }, 0) / graded.length) : 0;

  var totalPages = Math.ceil(allSessions.length / PAGE_SIZE);
  if (window._page > totalPages) window._page = totalPages || 1;
  var start = (window._page - 1) * PAGE_SIZE;
  var sessions = allSessions.slice(start, start + PAGE_SIZE);

  var html = '';

  // Filter bar
  html += '<div class="filter-bar">';
  html += '<button class="filter-btn' + (window._activeFilter === 'all' ? ' active' : '') + '" onclick="switchFilter(\'all\')">全部</button>';
  html += '<button class="filter-btn' + (window._activeFilter === 'low' ? ' active' : '') + '" onclick="switchFilter(\'low\')">&lt;6分</button>';
  html += '<button class="filter-btn' + (window._activeFilter === 'mid' ? ' active' : '') + '" onclick="switchFilter(\'mid\')">6-8分</button>';
  html += '<button class="filter-btn' + (window._activeFilter === 'high' ? ' active' : '') + '" onclick="switchFilter(\'high\')">&gt;8分</button>';
  html += '</div>';

  // Stats
  html += '<div style="margin-bottom:16px;color:var(--text2);font-size:0.9rem">'
    + allSessions.length + ' sessions';
  if (graded.length) html += ' &middot; ' + graded.length + ' graded &middot; avg overall: <b style="color:' + scoreColor(avgOverall) + '">' + (avgOverall*100).toFixed(1) + '%</b>';
  if (pending.length) html += ' &middot; ' + pending.length + ' pending';
  html += '</div>';

  if (allSessions.length === 0) {
    html += '<div class="empty-state"><p>No sessions match this filter.</p></div>';
  } else {
    html += '<div class="card"><table><thead><tr><th>Session</th><th>Model</th><th>Turns</th><th>Overall</th><th>Dimensions</th><th>Diag</th><th>Probe</th></tr></thead><tbody>';

    for (var i = 0; i < sessions.length; i++) {
      var s = sessions[i];
      html += '<tr>';
      html += '<td><span class="session-link" onclick="navTo({view:\'detail\',session:\'' + escAttr(s.session_id) + '\'})">' + escHtml(s.session_id) + '</span></td>';
      html += '<td class="hide-mobile">' + escHtml(s.model) + '</td>';
      html += '<td>' + s.turn_count + '</td>';
      if (s.graded) {
        html += '<td><b class="' + scoreClass(s.overall) + '">' + s.overall.toFixed(2) + '</b> ' + barHtml(s.overall) + '</td>';
        html += '<td class="hide-mobile"><div class="dim-mini">';
        for (var j = 0; j < s.dimensions.length; j++) {
          var d = s.dimensions[j];
          html += '<span title="' + escAttr(d.metric) + ': ' + d.score.toFixed(2) + '">' + escHtml(abbrevMetric(d.metric)) + ' ' + d.score.toFixed(2) + '</span>';
        }
        html += '</div></td>';
        html += '<td>' + diagCell(s) + '</td>';
        html += '<td>' + probeCell(s) + '</td>';
      } else {
        html += '<td><button class="btn btn-sm" onclick="event.stopPropagation();triggerGrade(\'' + escAttr(s.session_id) + '\').then(function(){renderDashboard();})">Grade</button></td><td class="hide-mobile"></td>';
        html += '<td>' + diagCell(s) + '</td>';
        html += '<td>' + probeCell(s) + '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';

    // Pagination
    if (totalPages > 1) {
      html += '<div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px;font-size:0.85rem">';
    html += '<button class="btn btn-sm" onclick="goPage(' + (window._page - 1) + ')"' + (window._page <= 1 ? ' disabled' : '') + '>&laquo; Prev</button>';
    for (var p = 1; p <= totalPages; p++) {
      if (p === window._page) {
        html += '<span style="padding:4px 10px;background:var(--accent);border-radius:4px;color:#fff">' + p + '</span>';
      } else if (p <= 3 || p > totalPages - 3 || Math.abs(p - window._page) <= 1) {
        html += '<button class="btn btn-sm" onclick="goPage(' + p + ')">' + p + '</button>';
      } else if (p === 4 || p === totalPages - 3) {
        html += '<span style="color:var(--text2)">...</span>';
      }
    }
    html += '<button class="btn btn-sm" onclick="goPage(' + (window._page + 1) + ')"' + (window._page >= totalPages ? ' disabled' : '') + '>Next &raquo;</button>';
    html += '<span style="color:var(--text2);margin-left:8px">' + allSessions.length + ' total / ' + PAGE_SIZE + ' per page</span>';
    html += '</div>';
    }
  }

  document.getElementById('content').innerHTML = html;
}

function abbrevMetric(m) {
  var map = { task_completion: 'TC', tool_efficiency: 'TE', response_quality: 'RQ', performance: 'PF' };
  return map[m] || m;
}

// ── Detail ──
async function renderDetail(sessionId) {
  document.getElementById('page-title').textContent = 'Session Detail';
  document.getElementById('header-actions').innerHTML = '';
  document.getElementById('content').innerHTML = '<div class="loading">Loading session...</div>';

  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId));
    if (!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
    var data = await resp.json();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><h2>Error</h2><p>' + e.message + '</p><p><a href="javascript:navTo({})">Back to dashboard</a></p></div>';
    return;
  }

  var view = data.view;
  var grade = data.grade;
  var sessionTitle = view.session_id || sessionId;

  var html = '<a class="back-link" href="javascript:navTo({})">&larr; Back to dashboard</a>';
  html += '<h2 style="margin-top:12px">' + escHtml(sessionTitle) + '</h2>';
  html += '<div class="meta">';
  html += '<span>Model: <b>' + escHtml(view.model) + '</b></span>';
  html += '<span>Turns: <b>' + view.turns.length + '</b></span>';
  if (view.jsonl_ids && view.jsonl_ids.length) {
    html += '<span>JSONL IDs: ' + escHtml(JSON.stringify(view.jsonl_ids)) + '</span>';
  }
  html += '</div>';

  // Grade section
  if (grade) {
    var overallScore = grade.overall;
    html += '<div class="card overall-display">';
    html += '<div class="big-score ' + scoreClass(overallScore) + '">' + overallScore.toFixed(2) + '</div>';
    html += '<div class="big-label">Overall Score</div>';
    html += barHtmlLg(overallScore);
    html += '</div>';

    html += '<h3 style="margin-bottom:10px">Dimension Scores</h3>';
    for (var i = 0; i < grade.dimensions.length; i++) {
      var d = grade.dimensions[i];
      html += '<div class="card dim-card">';
      html += '<div class="dim-header">';
      html += '<span class="dim-name">' + escHtml(d.metric) + ' <span class="dim-source">' + escHtml(d.source) + '</span></span>';
      html += '<span style="font-size:1.2rem;font-weight:700;color:' + scoreColor(d.score) + '">' + d.score.toFixed(2) + '</span>';
      html += '</div>';
      html += barHtml(d.score);
      if (d.reason) html += '<div class="dim-reason">' + escHtml(d.reason) + '</div>';
      if (d.details && Object.keys(d.details).length) html += '<div class="dim-details">' + escHtml(JSON.stringify(d.details, null, 2)) + '</div>';
      html += '<div class="dim-weight">weight: ' + d.weight.toFixed(2) + '</div>';
      html += '</div>';
    }
  } else {
    html += '<div class="card" style="text-align:center;padding:20px">';
    html += '<p style="color:var(--text2);margin-bottom:12px">Not yet graded</p>';
    html += '<button class="btn" onclick="triggerGrade(\'' + escAttr(sessionId) + '\')">Grade Now</button>';
    html += '<p id="grade-status" style="color:var(--text2);margin-top:8px;font-size:0.85rem"></p>';
    html += '</div>';
  }

  // Diagnose panel (loaded below grade section)
  var diagReport = await loadDiagnose(sessionId);
  if (diagReport) {
    html += renderDiagnosePanel(diagReport, sessionId);
  } else {
    html += '<div class="diag-panel" style="margin-top:20px">';
    html += '<button class="btn" onclick="triggerDiagnoseDetail(\'' + escAttr(sessionId) + '\')">\ud83d\udd0d Run Diagnosis</button>';
    html += '<span id="diag-status" style="color:var(--text2);margin-left:10px;font-size:0.85rem"></span>';
    html += '<div id="diag-result"></div>';
    html += '</div>';
  }

  // Probe panel (loaded below diagnose panel)
  var probeReport = await loadProbe(sessionId);
  if (probeReport) {
    html += renderProbePanel(probeReport, sessionId);
  } else {
    var hasDiag = diagReport && diagReport.issues && diagReport.issues.length > 0;
    html += '<div class="diag-panel" style="margin-top:20px">';
    if (hasDiag) {
      html += '<button class="btn" onclick="triggerProbeDetail(\'' + escAttr(sessionId) + '\')">\ud83d\udd0d Run Probe</button>';
      html += '<span id="probe-status" style="color:var(--text2);margin-left:10px;font-size:0.85rem"></span>';
    } else {
      html += '<span style="color:var(--text2);font-size:0.85rem">Run diagnosis first to enable probe</span>';
    }
    html += '<div id="probe-result"></div>';
    html += '</div>';
  }

  // Conversation
  html += '<h3 style="margin-bottom:10px;margin-top:20px">Conversation</h3>';
  if (view.turns.length === 0) {
    html += '<div class="card" style="text-align:center;color:var(--text2)">No turns</div>';
  } else {
    for (var t = 0; t < view.turns.length; t++) {
      var turn = view.turns[t];
      html += '<div class="turn card">';
      var duration = turn.duration_ms ? ' [' + formatMs(turn.duration_ms) + ']' : '';
      var tokens = turn.usage ? ' [' + turn.usage.input_tokens + ' in / ' + turn.usage.output_tokens + ' out]' : '';
      html += '<div class="turn-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">';
      html += '<span>Turn ' + turn.turn_id + '<span style="color:var(--text2);font-size:0.8rem">' + duration + tokens + '</span></span>';
      html += '<span style="color:var(--text2);font-size:0.8rem">' + turn.steps.length + ' steps</span>';
      html += '</div>';
      html += '<div class="turn-body">';

      // User inputs
      if (turn.user_input && turn.user_input.length) {
        for (var ui = 0; ui < turn.user_input.length; ui++) {
          html += '<div class="user-input">' + escHtml(turn.user_input[ui]) + '</div>';
        }
      }
      // Tool results (submitted this turn)
      if (turn.tool_results && turn.tool_results.length) {
        for (var tr = 0; tr < turn.tool_results.length; tr++) {
          var trr = turn.tool_results[tr];
          html += '<div class="step tool_result"><span class="step-badge badge-result">Result</span><span style="color:var(--text2);font-size:0.75rem">' + escHtml(trr.call_id) + '</span><div class="step-content">' + escHtml(truncate(trr.content, 500)) + '</div></div>';
        }
      }
      // Steps
      for (var si = 0; si < turn.steps.length; si++) {
        var step = turn.steps[si];
        if (step.type === 'reasoning') {
          html += '<div class="step reasoning"><span class="step-badge badge-reasoning">Reasoning</span><div class="step-content">' + escHtml(truncate(step.content, 1000)) + '</div></div>';
        } else if (step.type === 'text') {
          html += '<div class="step text"><span class="step-badge badge-text">Text</span><div class="step-content">' + escHtml(step.content) + '</div></div>';
        } else if (step.type === 'tool_call') {
          html += '<div class="step tool_call"><span class="step-badge badge-tool">ToolCall</span><span style="color:var(--text)">' + escHtml(step.name) + '</span> <span style="color:var(--text2);font-size:0.78rem">' + escHtml(truncate(JSON.stringify(step.arguments), 200)) + '</span>';
          if (step.result) {
            html += '<div style="margin-top:4px;font-size:0.82rem;color:var(--text2)"><span class="step-badge badge-result" style="font-size:0.65rem">Result</span>' + escHtml(truncate(step.result.content, 500)) + '</div>';
          }
          html += '</div>';
        }
      }
      html += '</div></div>';
    }
  }

  document.getElementById('content').innerHTML = html;

  // Scroll to anchor if navigated from dashboard badge
  var qp = new URLSearchParams(window.location.search);
  var scrollTo = qp.get('scroll');
  if (scrollTo) {
    setTimeout(function() {
      var el = document.getElementById(scrollTo === 'diag' ? 'diagnose-panel' : 'probe-panel');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 150);
  }
}

// ── Utils ──
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function truncate(s, maxLen) {
  if (!s || s.length <= maxLen) return s;
  return s.slice(0, maxLen) + '...';
}

// ── Auto-refresh ──
window._autoInterval = null;

function toggleAutoRefresh(on) {
  if (on) {
    window._autoInterval = setInterval(function() {
      var params = new URLSearchParams(window.location.search);
      if (!params.get('view') || params.get('view') === 'dashboard') {
        renderDashboard();
      }
    }, 10000);
  } else {
    if (window._autoInterval) clearInterval(window._autoInterval);
    window._autoInterval = null;
  }
}

// ── Grade trigger ──
async function triggerGrade(sessionId, btn) {
  if (!btn) btn = event.target;
  var status = document.getElementById('grade-status');
  btn.disabled = true;
  btn.textContent = 'Grading...';
  if (status) status.textContent = '';
  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId) + '/grade', { method: 'POST' });
    if (!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
    var data = await resp.json();
    if (data.grade) {
      if (status) {
        status.textContent = 'Done! Overall: ' + data.grade.overall.toFixed(2);
        status.style.color = scoreColor(data.grade.overall);
        renderDetail(sessionId);
      } else {
        renderDashboard();
      }
    }
  } catch (e) {
    if (status) {
      status.textContent = 'Failed: ' + e.message;
      status.style.color = 'var(--red)';
    }
    btn.disabled = false;
    btn.textContent = 'Grade Now';
  }
}

// ── Diagnose ──
window._diagCache = {};

function diagCell(s) {
  var showDiag = !s.graded || s.overall < 0.6;
  if (!showDiag) return '';
  var sid = s.session_id;

  // Server-provided summary (from .diagnose.json on disk) takes priority
  var summary = s.diagnose_summary || window._diagCache[sid];
  if (summary === undefined) {
    return '<span class="diag-badge diag-btn" onclick="event.stopPropagation();triggerDiagnose(\'' + escAttr(sid) + '\', this)">Diagnose</span>';
  }
  if (summary === null) {
    return '<span class="diag-badge diag-pending">...</span>';
  }
  if (summary.total_issues > 0) {
    var label = '\u26a0 ' + summary.total_issues + ' issues';
    return '<span class="diag-badge diag-issues" onclick="event.stopPropagation();navTo({view:\'detail\',session:\'' + escAttr(sid) + '\',scroll:\'diag\'})" title="' + summary.errors + ' errors, ' + summary.warnings + ' warnings">' + label + '</span>';
  }
  return '<span class="diag-badge diag-clean">\u2713 clean</span>';
}

async function triggerDiagnose(sessionId, el) {
  window._diagCache[sessionId] = null;
  el.className = 'diag-badge diag-pending';
  el.textContent = '...';
  el.onclick = '';
  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId) + '/diagnose', { method: 'POST' });
    if (!resp.ok) throw new Error(resp.status);
    var report = await resp.json();
    window._diagCache[sessionId] = report.summary;
  } catch (e) {
    window._diagCache[sessionId] = { total_issues: 0, errors: 0, warnings: 0, infos: 0 };
  }
  renderDashboard();
}

async function loadDiagnose(sessionId) {
  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId) + '/diagnose');
    if (!resp.ok) return null;
    return await resp.json();
  } catch (e) {
    return null;
  }
}

function renderDiagnosePanel(report, sessionId) {
  if (!report || !report.issues) return '';
  var html = '<div class="diag-panel" id="diagnose-panel">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  html += '<h3 style="margin:0">\ud83d\udd0d Diagnosis</h3>';
  if (sessionId) {
    html += '<button class="btn btn-sm" onclick="event.stopPropagation();triggerReDiagnose(\'' + escAttr(sessionId) + '\')">\ud83d\udd04 Re-diagnose</button>';
  }
  html += '</div>';
  html += '<div class="card">';

  // LLM summary at top
  if (report.llm_summary) {
    html += '<div style="margin-bottom:14px;padding:10px 14px;background:rgba(68,138,255,0.08);border-left:3px solid var(--blue);border-radius:4px;font-size:0.88rem;line-height:1.5;color:var(--text)">';
    html += '<b style="color:var(--blue)">AI Summary:</b> ' + escHtml(report.llm_summary);
    html += '</div>';
  }

  if (report.issues.length === 0) {
    html += '<div style="text-align:center;padding:16px;color:var(--green)">\u2713 No issues found</div>';
  } else {
    var s = report.summary;
    html += '<div style="margin-bottom:12px;font-size:0.9rem;color:var(--text2)">';
    html += '\u26a0 ' + s.total_issues + ' issues found (' + s.errors + ' errors, ' + s.warnings + ' warnings, ' + s.infos + ' infos)';
    html += '</div>';

    for (var i = 0; i < report.issues.length; i++) {
      var issue = report.issues[i];
      var sevClass = issue.severity === 'Error' ? 'sev-error' : (issue.severity === 'Warn' ? 'sev-warn' : 'sev-info');
      var icon = issue.severity === 'Error' ? '\ud83d\udd34' : (issue.severity === 'Warn' ? '\ud83d\udfe1' : '\ud83d\udd35');
      var catClass = 'cat-' + issue.category.toLowerCase();
      html += '<div class="diag-issue-card ' + sevClass + '">';
      html += '<div class="diag-issue-title">' + icon + ' <span class="diag-issue-cat ' + catClass + '">' + escHtml(issue.category) + '</span> ' + escHtml(issue.title) + '</div>';
      html += '<div class="diag-issue-detail">' + escHtml(issue.detail) + '</div>';
      if (issue.location && (issue.location.jsonl_id || issue.location.turn_id)) {
        html += '<div class="diag-issue-loc">Location: jsonl_id=' + escHtml(String(issue.location.jsonl_id)) + ', turn=' + escHtml(String(issue.location.turn_id)) + ', step=' + escHtml(String(issue.location.step_index)) + '</div>';
      }
      if (issue.evidence) {
        html += '<details class="diag-issue-evidence"><summary>Evidence</summary><div style="margin-top:4px">' + escHtml(issue.evidence) + '</div></details>';
      }
      html += '</div>';
    }
  }
  html += '</div></div>';
  return html;
}


async function triggerDiagnoseDetail(sessionId) {
  var btn = event.target;
  var status = document.getElementById('diag-status');
  var result = document.getElementById('diag-result');
  btn.disabled = true;
  btn.textContent = 'Diagnosing...';
  if (status) status.textContent = '';
  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId) + '/diagnose', { method: 'POST' });
    if (!resp.ok) throw new Error(resp.status);
    var report = await resp.json();
    if (result) result.innerHTML = renderDiagnosePanel(report, sessionId);
    btn.style.display = 'none';
    if (status) { status.textContent = 'Done!'; status.style.color = 'var(--green)'; }
  } catch (e) {
    if (status) { status.textContent = 'Failed: ' + e.message; status.style.color = 'var(--red)'; }
    btn.disabled = false;
    btn.textContent = '\ud83d\udd0d Run Diagnosis';
  }
}

async function triggerReDiagnose(sessionId) {
  var panel = document.querySelector('.diag-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="card" style="text-align:center;padding:20px;color:var(--text2)">Re-diagnosing...</div>';
  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId) + '/diagnose', { method: 'POST' });
    if (!resp.ok) throw new Error(resp.status);
    var report = await resp.json();
    window._diagCache[sessionId] = report.summary;
    panel.outerHTML = renderDiagnosePanel(report, sessionId);
  } catch (e) {
    panel.innerHTML = '<div class="card" style="text-align:center;padding:20px;color:var(--red)">Re-diagnose failed: ' + escHtml(e.message) + '</div>';
  }
}

// ── Probe ──
window._probeCache = {};

function probeCell(s) {
  var showProbe = !s.graded || s.overall < 0.6;
  if (!showProbe) return '';
  var sid = s.session_id;

  var summary = s.probe_summary || window._probeCache[sid];
  if (summary === undefined) {
    // Check if diagnose exists first — probe requires diagnose
    var hasDiag = s.diagnose_summary && s.diagnose_summary.total_issues > 0;
    if (!hasDiag) return '';
    return '<span class="diag-badge diag-btn" onclick="event.stopPropagation();triggerProbe(\'' + escAttr(sid) + '\', this)">Probe</span>';
  }
  if (summary === null) {
    return '<span class="diag-badge diag-pending">...</span>';
  }
  if (summary.total_findings > 0) {
    var parts = [];
    if (summary.high > 0) parts.push(summary.high + ' high');
    if (summary.medium > 0) parts.push(summary.medium + ' med');
    if (summary.low > 0) parts.push(summary.low + ' low');
    return '<span class="diag-badge diag-issues" onclick="event.stopPropagation();navTo({view:\'detail\',session:\'' + escAttr(sid) + '\',scroll:\'probe\'})" title="' + parts.join(', ') + '">\ud83d\udd0d ' + summary.total_findings + ' findings</span>';
  }
  return '<span class="diag-badge diag-clean">\u2713 no findings</span>';
}

async function triggerProbe(sessionId, el) {
  window._probeCache[sessionId] = null;
  el.className = 'diag-badge diag-pending';
  el.textContent = '...';
  el.onclick = '';
  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId) + '/probe', { method: 'POST' });
    if (!resp.ok) throw new Error(resp.status);
    var report = await resp.json();
    window._probeCache[sessionId] = { total_findings: (report.findings ? report.findings.length : 0) + (report.additional_findings ? report.additional_findings.length : 0), high: 0, medium: 0, low: 0 };
  } catch (e) {
    window._probeCache[sessionId] = { total_findings: 0, high: 0, medium: 0, low: 0 };
  }
  renderDashboard();
}

async function loadProbe(sessionId) {
  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId) + '/probe');
    if (!resp.ok) return null;
    return await resp.json();
  } catch (e) {
    return null;
  }
}

function renderProbePanel(report, sessionId) {
  if (!report) return '';
  var allFindings = (report.findings || []).concat(report.additional_findings || []);
  var html = '<div class="diag-panel" id="probe-panel">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  html += '<h3 style="margin:0">\ud83d\udd0d Probe</h3>';
  if (sessionId) {
    html += '<button class="btn btn-sm" onclick="event.stopPropagation();triggerReProbe(\'' + escAttr(sessionId) + '\')">\ud83d\udd04 Re-probe</button>';
  }
  html += '</div>';
  html += '<div class="card">';

  // Overall assessment at top
  if (report.overall_assessment) {
    html += '<div style="margin-bottom:14px;padding:10px 14px;background:rgba(68,138,255,0.08);border-left:3px solid var(--blue);border-radius:4px;font-size:0.88rem;line-height:1.5;color:var(--text)">';
    html += '<b style="color:var(--blue)">AI Summary:</b> ' + escHtml(report.overall_assessment);
    html += '</div>';
  }

  if (allFindings.length === 0) {
    html += '<div style="text-align:center;padding:16px;color:var(--green)">\u2713 No findings</div>';
  } else {
    html += '<div style="margin-bottom:12px;font-size:0.9rem;color:var(--text2)">';
    html += '\ud83d\udd0d ' + allFindings.length + ' findings';
    var high = allFindings.filter(function(f) { return f.confidence === 'high'; }).length;
    var med = allFindings.filter(function(f) { return f.confidence === 'medium'; }).length;
    var low = allFindings.filter(function(f) { return f.confidence === 'low'; }).length;
    if (high > 0) html += ' (' + high + ' high';
    if (med > 0) html += (high > 0 ? ', ' : ' (') + med + ' medium';
    if (low > 0) html += ((high > 0 || med > 0) ? ', ' : ' (') + low + ' low';
    if (high > 0 || med > 0 || low > 0) html += ')';
    html += '</div>';

    for (var i = 0; i < allFindings.length; i++) {
      var f = allFindings[i];
      var sevClass = f.confidence === 'high' ? 'sev-error' : (f.confidence === 'medium' ? 'sev-warn' : 'sev-info');
      var icon = f.confidence === 'high' ? '\ud83d\udd34' : (f.confidence === 'medium' ? '\ud83d\udfe1' : '\ud83d\udd35');
      html += '<div class="diag-issue-card ' + sevClass + '">';
      html += '<div class="diag-issue-title">' + icon + ' <span class="diag-issue-cat">' + escHtml(f.category || 'General') + '</span> ' + escHtml(f.issue_title || 'Finding') + '</div>';
      html += '<div class="diag-issue-detail"><b>Root cause:</b> ' + escHtml(f.root_cause || '') + '</div>';
      if (f.recommendation) {
        html += '<div class="diag-issue-detail" style="margin-top:4px"><b>Recommendation:</b> ' + escHtml(f.recommendation) + '</div>';
      }
      if (f.affected_files && f.affected_files.length) {
        html += '<div class="diag-issue-loc">Files: ' + escHtml(f.affected_files.join(', ')) + '</div>';
      }
      if (f.evidence) {
        html += '<details class="diag-issue-evidence"><summary>Evidence</summary><div style="margin-top:4px">' + escHtml(f.evidence) + '</div></details>';
      }
      html += '</div>';
    }
  }

  if (report.parse_error) {
    html += '<div style="margin-top:10px;padding:10px;background:rgba(255,23,68,0.1);border-radius:4px;font-size:0.82rem;color:var(--red)">';
    html += 'Parse error: LLM output could not be parsed as JSON. Raw output preserved.';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

async function triggerProbeDetail(sessionId) {
  var btn = event.target;
  var status = document.getElementById('probe-status');
  var result = document.getElementById('probe-result');
  btn.disabled = true;
  btn.textContent = 'Probing...';
  if (status) status.textContent = '';
  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId) + '/probe', { method: 'POST' });
    if (!resp.ok) throw new Error(resp.status);
    var report = await resp.json();
    if (result) result.innerHTML = renderProbePanel(report, sessionId);
    btn.style.display = 'none';
    if (status) { status.textContent = 'Done!'; status.style.color = 'var(--green)'; }
  } catch (e) {
    if (status) { status.textContent = 'Failed: ' + e.message; status.style.color = 'var(--red)'; }
    btn.disabled = false;
    btn.textContent = '\ud83d\udd0d Run Probe';
  }
}

async function triggerReProbe(sessionId) {
  var panel = document.querySelector('.diag-panel:last-of-type');
  if (!panel) return;
  panel.innerHTML = '<div class="card" style="text-align:center;padding:20px;color:var(--text2)">Re-probing...</div>';
  try {
    var resp = await fetch(API + '/sessions/' + encodeURIComponent(sessionId) + '/probe', { method: 'POST' });
    if (!resp.ok) throw new Error(resp.status);
    var report = await resp.json();
    window._probeCache[sessionId] = { total_findings: (report.findings ? report.findings.length : 0) + (report.additional_findings ? report.additional_findings.length : 0), high: 0, medium: 0, low: 0 };
    panel.outerHTML = renderProbePanel(report, sessionId);
  } catch (e) {
    panel.innerHTML = '<div class="card" style="text-align:center;padding:20px;color:var(--red)">Re-probe failed: ' + escHtml(e.message) + '</div>';
  }
}

// ── Init ──
window.addEventListener('popstate', route);
route();
